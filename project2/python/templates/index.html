<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLB Network Logger</title>
  <style>
    /* ── Reset & variables ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #161b22;
      --panel:    #1e2430;
      --border:   #30363d;
      --text:     #c9d1d9;
      --dim:      #8b949e;
      --green:    #50c878;
      --red:      #dc4c4c;
      --yellow:   #f0b428;
      --blue:     #b4bbff;
      --hdr-bg:   #0d1117;
      --row-hover:#1e2430;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────────── */
    #header {
      background: var(--hdr-bg);
      border-bottom: 1px solid var(--border);
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 36px;
    }

    #header h1 {
      color: var(--blue);
      font-size: 13px;
      font-weight: normal;
      letter-spacing: 0.02em;
    }

    .dot { font-size: 9px; line-height: 1; }
    .ok   { color: var(--green); }
    .lost { color: var(--red);   }
    .dim  { color: var(--dim);   }

    #local-label { color: var(--dim); font-size: 12px; }

    #toggle-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #toggle-label { font-size: 12px; }
    #toggle-label.on  { color: var(--green); }
    #toggle-label.off { color: var(--red);   }

    #toggle-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-radius: 3px;
      transition: border-color 0.15s;
    }
    #toggle-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* ── Body ────────────────────────────────────────────────────────────────── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Node panel ──────────────────────────────────────────────────────────── */
    #panel-nodes {
      width: 195px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    #panel-nodes h2 {
      color: var(--blue);
      font-size: 11px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #node-list {
      padding: 6px;
      overflow-y: auto;
      flex: 1;
    }

    .node-row {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 4px;
      border-radius: 3px;
    }
    .node-row:hover { background: #252d3a; }

    .node-id {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .node-status { font-size: 11px; white-space: nowrap; }
    .node-status.ok   { color: var(--green); }
    .node-status.lost { color: var(--red);   }

    #nodes-empty { color: var(--dim); font-size: 12px; padding: 4px; }

    /* ── Log panel ───────────────────────────────────────────────────────────── */
    #panel-log {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-log h2 {
      color: var(--blue);
      font-size: 11px;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    #log-wrap {
      flex: 1;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #232b38;
      color: var(--dim);
      font-weight: normal;
      text-align: left;
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr { border-bottom: 1px solid #1c222c; }
    tbody tr:hover { background: var(--row-hover); }

    td { padding: 3px 10px; vertical-align: top; }
    td.ts      { color: var(--dim);    white-space: nowrap; width: 105px; }
    td.node-id { color: var(--yellow); white-space: nowrap; width: 100px; }
    td.payload { color: var(--text);   word-break: break-all; }

    /* ── Scrollbars (Webkit) ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────────── -->
  <div id="header">
    <h1>SLB Network Logger</h1>
    <span id="local-dot" class="dot dim">●</span>
    <span id="local-label">Connecting…</span>
    <div id="toggle-wrap">
      <span id="toggle-label" class="on">Diagnostic Logging: ON</span>
      <button id="toggle-btn" onclick="toggleLogging()">Turn OFF</button>
    </div>
  </div>

  <!-- ── Body ────────────────────────────────────────────────────────────────── -->
  <div id="body">

    <!-- Node overview panel -->
    <div id="panel-nodes">
      <h2>Network Overview</h2>
      <div id="node-list">
        <div id="nodes-empty">No nodes seen yet.</div>
      </div>
    </div>

    <!-- Live log panel -->
    <div id="panel-log">
      <h2>Live Diagnostic Log</h2>
      <div id="log-wrap">
        <table>
          <thead>
            <tr>
              <th>Timestamp</th>
              <th>Producer ID</th>
              <th>Payload</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>

  </div><!-- #body -->

  <script>
    'use strict';

    const MAX_ROWS = 200;
    let loggingEnabled = true;
    const nodes = {};   // nodeId → DOM row element

    // ── SSE ─────────────────────────────────────────────────────────────────────
    const evtSource = new EventSource('/stream');

    evtSource.addEventListener('log', function(e) {
      appendLog(JSON.parse(e.data));
    });

    evtSource.addEventListener('node_status', function(e) {
      const d = JSON.parse(e.data);
      updateNode(d.node_id, d.status);
    });

    evtSource.onopen = function() {
      document.getElementById('local-dot').className = 'dot ok';
      document.getElementById('local-label').textContent = 'Local Node: OK';
      document.getElementById('local-label').style.color = '';
    };

    evtSource.onerror = function() {
      document.getElementById('local-dot').className = 'dot lost';
      document.getElementById('local-label').textContent = 'Local Node: LOST';
      document.getElementById('local-label').style.color = 'var(--red)';
    };

    // ── Log table ────────────────────────────────────────────────────────────────
    function appendLog(d) {
      const tbody = document.getElementById('log-body');
      const wrap  = document.getElementById('log-wrap');

      // Detect if user is scrolled near the bottom
      const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60;

      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="ts">'      + esc(d.ts)      + '</td>' +
        '<td class="node-id">' + esc(d.node_id) + '</td>' +
        '<td class="payload">' + esc(d.payload) + '</td>';
      tbody.appendChild(tr);

      // Evict oldest rows to keep memory bounded
      while (tbody.rows.length > MAX_ROWS) {
        tbody.deleteRow(0);
      }

      if (atBottom) { wrap.scrollTop = wrap.scrollHeight; }
    }

    // ── Node panel ───────────────────────────────────────────────────────────────
    function updateNode(nodeId, status) {
      const list = document.getElementById('node-list');

      if (!nodes[nodeId]) {
        // First time seeing this node — hide placeholder and add row
        const hint = document.getElementById('nodes-empty');
        if (hint) { hint.style.display = 'none'; }

        const row = document.createElement('div');
        row.className = 'node-row';
        row.innerHTML =
          '<span class="dot ok">●</span>' +
          '<span class="node-id">' + esc(nodeId) + '</span>' +
          '<span class="node-status ok">OK</span>';
        list.appendChild(row);
        nodes[nodeId] = row;
      }

      const row      = nodes[nodeId];
      const dot      = row.querySelector('.dot');
      const statusEl = row.querySelector('.node-status');

      if (status === 'ok') {
        dot.className      = 'dot ok';
        statusEl.className = 'node-status ok';
        statusEl.textContent = 'OK';
      } else {
        dot.className      = 'dot lost';
        statusEl.className = 'node-status lost';
        statusEl.textContent = 'LOST';
      }
    }

    // ── Diagnostic toggle ────────────────────────────────────────────────────────
    function toggleLogging() {
      loggingEnabled = !loggingEnabled;

      fetch('/toggle', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ enabled: loggingEnabled }),
      });

      const label = document.getElementById('toggle-label');
      const btn   = document.getElementById('toggle-btn');

      if (loggingEnabled) {
        label.textContent = 'Diagnostic Logging: ON';
        label.className   = 'on';
        btn.textContent   = 'Turn OFF';
      } else {
        label.textContent = 'Diagnostic Logging: OFF';
        label.className   = 'off';
        btn.textContent   = 'Turn ON';
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
